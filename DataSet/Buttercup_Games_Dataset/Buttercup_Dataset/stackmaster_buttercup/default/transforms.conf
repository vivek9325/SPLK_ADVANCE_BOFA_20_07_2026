# ---- product lookup: productId -> product_name (+ category/price fallback) ----
[buttercup_products]
filename = products.csv

# ---- linux_secure field extractions (user, src_ip, port, vendor_action) ----
[ls_failed]
REGEX = (?<vendor_action>Failed password)\s+for\s+(?:invalid user\s+)?(?<user>\S+)\s+from\s+(?<src_ip>\d{1,3}(?:\.\d{1,3}){3})\s+port\s+(?<port>\d+)

[ls_accepted]
REGEX = (?<vendor_action>Accepted password)\s+for\s+(?<user>\S+)\s+from\s+(?<src_ip>\d{1,3}(?:\.\d{1,3}){3})\s+port\s+(?<port>\d+)

# ---- Day 2 CSV lookups ----
[http_status_lookup]
