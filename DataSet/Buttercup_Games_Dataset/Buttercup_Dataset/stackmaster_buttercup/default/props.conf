# ============================================================
# access_combined  (index=web)
# ============================================================
[access_combined]
# key=value pairs in the URL query string (action, productId, categoryId,
# price, JSESSIONID) are picked up by auto-KV. We add explicit extractions
# too, so the fields resolve even if KV_MODE is changed.
KV_MODE = auto
EXTRACT-bc_action     = [?&]action=(?<action>[^&"\s]+)
EXTRACT-bc_productId  = [?&]productId=(?<productId>[^&"\s]+)
EXTRACT-bc_categoryId = [?&]categoryId=(?<categoryId>[^&"\s]+)
EXTRACT-bc_price      = [?&]price=(?<price>[0-9.]+)
EXTRACT-bc_jsession   = [?&]JSESSIONID=(?<JSESSIONID>[^&"\s]+)
EXTRACT-bc_status     = "\s+(?<status>\d{3})\s+(?<bytes>\d+)\s+"
# friendly product_name from the lookup, keyed on productId
LOOKUP-bc_products    = buttercup_products productId OUTPUT product_name

# ============================================================
# linux_secure  (index=security)
# ============================================================
[linux_secure]
REPORT-ls = ls_failed, ls_accepted
